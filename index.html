<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algebra 1 Math Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 2rem 1rem; }
    .app { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 26px; font-weight: 600; color: #1a237e; margin-bottom: 4px; }
    .subtitle { font-size: 15px; color: #555; margin-bottom: 1.5rem; }

    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 14px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 600; color: #1a237e; }
    .stat-lbl { font-size: 12px; color: #888; margin-top: 2px; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    select { padding: 9px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; color: #111; }
    .btn { padding: 9px 20px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff; color: #111; }
    .btn:hover { background: #f0f0f0; }
    .btn-primary { background: #1a237e; color: #fff; border-color: #1a237e; }
    .btn-primary:hover { background: #283593; }

    /* Difficulty buttons */
    .difficulty-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .diff-btn { flex: 1; padding: 8px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #fff; transition: all 0.15s; }
    .diff-btn:hover { opacity: 0.85; }
    .diff-btn.easy   { color: #2e7d32; border-color: #a5d6a7; }
    .diff-btn.medium { color: #e65100; border-color: #ffcc80; }
    .diff-btn.hard   { color: #b71c1c; border-color: #ef9a9a; }
    .diff-btn.easy.active   { background: #e8f5e9; border-color: #2e7d32; }
    .diff-btn.medium.active { background: #fff3e0; border-color: #e65100; }
    .diff-btn.hard.active   { background: #ffebee; border-color: #b71c1c; }

    .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .badges { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
    .topic-badge { display: inline-block; font-size: 12px; padding: 3px 12px; border-radius: 20px; background: #e8eaf6; color: #1a237e; font-weight: 500; }
    .diff-badge { display: inline-block; font-size: 12px; padding: 3px 12px; border-radius: 20px; font-weight: 500; }
    .diff-badge.easy   { background: #e8f5e9; color: #2e7d32; }
    .diff-badge.medium { background: #fff3e0; color: #e65100; }
    .diff-badge.hard   { background: #ffebee; color: #b71c1c; }

    .problem-text { font-size: 18px; font-weight: 500; color: #111; margin-bottom: 1.25rem; line-height: 1.6; white-space: pre-line; }
    .input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .answer-input { padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; width: 220px; }
    .answer-input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 2px rgba(26,35,126,0.15); }

    .hint-link { font-size: 13px; color: #1a237e; cursor: pointer; text-decoration: underline; margin-top: 10px; display: none; }
    .hint { margin-top: 10px; padding: 10px 14px; border-left: 3px solid #9fa8da; background: #f5f5f5; font-size: 13px; color: #444; border-radius: 0 8px 8px 0; display: none; white-space: pre-line; }
    .feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 14px; display: none; }
    .feedback.correct { background: #e8f5e9; color: #2e7d32; display: block; }
    .feedback.wrong   { background: #ffebee; color: #c62828; display: block; }

    .footer { text-align: center; margin-top: 2rem; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
<div class="app">
  <h1>Algebra 1 Problem Generator</h1>
  <p class="subtitle">Select a topic and difficulty, then press New Problem</p>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">attempted</div></div>
    <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-lbl">correct</div></div>
    <div class="stat"><div class="stat-num" id="s-pct">—</div><div class="stat-lbl">accuracy</div></div>
  </div>

  <div class="controls">
    <select id="topic">
      <option value="factor">Solve by factoring</option>
      <option value="quadformula">Quadratic formula</option>
      <option value="complete">Complete the square</option>
      <option value="discriminant">Discriminant</option>
      <option value="system">Linear-quadratic systems</option>
    </select>
    <button class="btn btn-primary" onclick="newProblem()">&#8635; New Problem</button>
    <button class="btn" onclick="resetStats()">&#x2715; Reset</button>
  </div>

  <div class="difficulty-row">
    <button class="diff-btn easy active" onclick="setDiff('easy')">⭐ Easy</button>
    <button class="diff-btn medium" onclick="setDiff('medium')">⭐⭐ Medium</button>
    <button class="diff-btn hard" onclick="setDiff('hard')">⭐⭐⭐ Hard</button>
  </div>

  <div class="card">
    <div class="badges">
      <span class="topic-badge" id="badge-topic">Factoring</span>
      <span class="diff-badge easy" id="badge-diff">Easy</span>
    </div>
    <div class="problem-text" id="prob">Press "New Problem" to start</div>
    <div class="input-row">
      <input class="answer-input" id="ans" placeholder="e.g. x=2,x=-3" onkeydown="if(event.key==='Enter')checkAnswer()">
      <button class="btn btn-primary" onclick="checkAnswer()">&#10003; Check</button>
    </div>
    <span class="hint-link" id="hint-link" onclick="showHint()">Show hint</span>
    <div class="hint" id="hint"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="footer">Algebra 1 Math Generator &mdash; YanqinFang</div>
</div>

<script>
let current = null;
let total = 0, correct = 0;
let difficulty = 'easy';

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function fmt(n) { return Math.round(n * 100) / 100; }

function bStr(b) { return b === 0 ? '' : (b > 0 ? ` + ${b}x` : ` - ${Math.abs(b)}x`); }
function cStr(c) { return c === 0 ? '' : (c > 0 ? ` + ${c}` : ` - ${Math.abs(c)}`); }

// ── Difficulty config ────────────────────────────────────────────────────────
const config = {
  easy: {
    roots: [-3,-2,-1,1,2,3],
    a: [1],
    linSlopes: [1,-1,2],
    linConsts: [-2,0,2],
    hRange: [-2,-1,1,2],
    kRange: [-4,0,4],
    sysRoots: [-2,-1,1,2],
  },
  medium: {
    roots: [-5,-4,-3,-2,-1,1,2,3,4,5],
    a: [1,1,2],
    linSlopes: [-3,-2,-1,1,2,3],
    linConsts: [-4,-2,0,2,4],
    hRange: [-4,-3,-2,-1,1,2,3,4],
    kRange: [-9,-4,-1,0,1,4,9],
    sysRoots: [-3,-2,-1,1,2,3],
  },
  hard: {
    roots: [-6,-5,-4,-3,-2,-1,1,2,3,4,5,6],
    a: [2,3,4,5],
    linSlopes: [-5,-4,-3,-2,-1,1,2,3,4,5],
    linConsts: [-6,-4,-2,0,2,4,6],
    hRange: [-5,-4,-3,-2,-1,1,2,3,4,5],
    kRange: [-16,-9,-4,-1,0,1,4,9,16,25],
    sysRoots: [-4,-3,-2,-1,1,2,3,4],
  }
};

// ── Problem generators ───────────────────────────────────────────────────────
const topics = {

  factor: {
    label: 'Solve by factoring',
    gen(d) {
      const cfg = config[d];
      const a = d === 'hard' ? pick([2,3,4]) : 1;
      const r1 = pick(cfg.roots), r2 = pick(cfg.roots);
      // ax² - a(r1+r2)x + a*r1*r2 = 0
      const B = -a*(r1+r2), C = a*r1*r2;
      const aStr = a === 1 ? '' : a;
      let eq = `${aStr}x²${bStr(B)}${cStr(C)} = 0`;
      const hint = d === 'hard'
        ? `Factor out ${a} first if needed, or use the quadratic formula.\nRoots: x = ${r1}, x = ${r2}`
        : `Look for two numbers that multiply to ${C} and add to ${B}.\nHint: (x ${r1>=0?'- '+r1:'+ '+Math.abs(r1)})(x ${r2>=0?'- '+r2:'+ '+Math.abs(r2)}) = 0`;
      return { text: `Solve by factoring:\n  ${eq}`, answers: [r1, r2], hint };
    }
  },

  quadformula: {
    label: 'Quadratic formula',
    gen(d) {
      const cfg = config[d];
      const a = pick(cfg.a);
      if (d === 'hard') {
        // Irrational roots possible
        const b2 = pick([-5,-3,-1,1,3,5]);
        const c2 = pick([-7,-5,-3,-1,1,2]);
        const disc = b2*b2 - 4*a*c2;
        const B = b2, C = c2;
        const aStr = a === 1 ? '' : a;
        let ans, ansText;
        if (disc < 0) { ans = []; ansText = 'No real solutions'; }
        else if (disc === 0) { ans = [-B/(2*a)]; ansText = `x = ${fmt(-B/(2*a))}`; }
        else {
          const x1 = (-B + Math.sqrt(disc)) / (2*a);
          const x2 = (-B - Math.sqrt(disc)) / (2*a);
          ans = [x1, x2];
          ansText = `x ≈ ${fmt(x1)} or x ≈ ${fmt(x2)}`;
        }
        const hint = `a=${a}, b=${B}, c=${C}\nDiscriminant = ${B}²−4(${a})(${C}) = ${disc}\nx = (−${B} ± √${disc}) / ${2*a}`;
        return { text: `Use the quadratic formula (round to nearest hundredth):\n  ${aStr}x²${bStr(B)}${cStr(C)} = 0`, answers: ans, hint, irrational: true };
      } else {
        const r1 = pick(cfg.roots), r2 = pick(cfg.roots);
        const B = -a*(r1+r2), C = a*r1*r2;
        const aStr = a === 1 ? '' : a;
        const hint = `a=${a}, b=${B}, c=${C}\nDiscriminant = ${B}²−4(${a})(${C}) = ${B*B-4*a*C}\nx = (−(${B}) ± √${B*B-4*a*C}) / ${2*a}`;
        return { text: `Use the quadratic formula:\n  ${aStr}x²${bStr(B)}${cStr(C)} = 0`, answers: [r1, r2], hint };
      }
    }
  },

  complete: {
    label: 'Complete the square',
    gen(d) {
      const cfg = config[d];
      const h = pick(cfg.hRange);
      const k = pick(cfg.kRange);
      const b = -2*h, c = h*h + k;
      const disc = h*h - k;
      let answers, vertexStr;
      if (disc < 0) { answers = []; }
      else if (disc === 0) { answers = [h]; }
      else { const sq = Math.sqrt(disc); answers = [fmt(h+sq), fmt(h-sq)]; }
      vertexStr = `(${h}, ${k})`;
      const hint = `Step 1: Move constant → x² ${bStr(b)} = ${-c}\nStep 2: Add (${b}/2)² = ${h*h} to both sides\nStep 3: (x ${h>=0?'− '+h:'+ '+Math.abs(h)})² = ${-k}\nVertex: ${vertexStr}`;
      return { text: `Complete the square to solve:\n  x²${bStr(b)}${cStr(c)} = 0\n\nAlso state the vertex.`, answers, hint, vertex: vertexStr };
    }
  },

  discriminant: {
    label: 'Discriminant',
    gen(d) {
      const types = d === 'easy' ? ['two','one','none'] : ['two','two','one','none'];
      const type = pick(types);
      let a, b, c, label;
      if (d === 'hard') {
        a = pick([2,3]);
        if (type === 'two') { b=pick([-7,-5,-3,3,5,7]); c=pick([-6,-4,-2,-1]); label='2 real solutions'; }
        else if (type === 'one') { b=pick([-6,-4,-2,2,4,6]); c=b*b/(4*a); label='1 real solution'; }
        else { b=pick([-1,1,2]); c=pick([8,10,12,15]); label='No real solutions'; }
      } else {
        a = 1;
        if (type === 'two') { b=pick([-5,-4,-3,3,4,5]); c=pick([-6,-4,-3,-2,-1]); label='2 real solutions'; }
        else if (type === 'one') { b=pick([-6,-4,-2,2,4,6]); c=(b/2)*(b/2); label='1 real solution'; }
        else { b=pick([-2,-1,1,2]); c=pick([5,6,8,10]); label='No real solutions'; }
      }
      const disc = b*b - 4*a*c;
      const aStr = a === 1 ? '' : a;
      const hint = `Discriminant = b²−4ac\n= (${b})²−4(${a})(${c})\n= ${b*b}−${4*a*c}\n= ${disc}\n\n${disc>0?'> 0 → 2 real solutions':disc===0?'= 0 → 1 real solution':'< 0 → No real solutions'}`;
      return { text: `How many real solutions?\n  ${aStr}x²${bStr(b)}${cStr(c)} = 0`, answers: [label], hint };
    }
  },

  system: {
    label: 'Linear-quadratic system',
    gen(d) {
      const cfg = config[d];
      const x1 = pick(cfg.sysRoots), x2 = pick(cfg.sysRoots);
      const m = pick(cfg.linSlopes);
      const bl = pick(cfg.linConsts);
      const y1 = m*x1+bl, y2 = m*x2+bl;
      const B = -(x1+x2), C = x1*x2;
      const mStr = m===1?'':(m===-1?'-':m);
      const blStr = bl===0?'':(bl>0?` + ${bl}`:` − ${Math.abs(bl)}`);
      const hint = `Substitute y = ${mStr}x${blStr} into the quadratic:\n  x²${bStr(B)}${cStr(C)} = ${mStr}x${blStr}\nRearrange to standard form and solve.`;
      return {
        text: `Solve the system:\n  y = x²${bStr(B)}${cStr(C)}\n  y = ${mStr}x${blStr}`,
        answers: [[x1,y1],[x2,y2]], hint
      };
    }
  }
};

// ── UI helpers ───────────────────────────────────────────────────────────────
function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.diff-btn.' + d).classList.add('active');
  const badge = document.getElementById('badge-diff');
  badge.className = 'diff-badge ' + d;
  badge.textContent = d.charAt(0).toUpperCase() + d.slice(1);
  newProblem();
}

function parseAnswers(str) {
  return str.toLowerCase().replace(/\s/g,'').split(',').map(s => {
    const m = s.match(/x=(-?\d+\.?\d*)/);
    return m ? parseFloat(m[1]) : parseFloat(s);
  }).filter(v => !isNaN(v));
}

function checkAnswer() {
  if (!current) return;
  const raw = document.getElementById('ans').value.trim();
  if (!raw) return;
  const topic = document.getElementById('topic').value;
  const fb = document.getElementById('feedback');
  total++;

  let ok = false;
  if (topic === 'discriminant') {
    const lower = raw.toLowerCase(), a = current.answers[0].toLowerCase();
    if (a.includes('2')) ok = lower.includes('2') || lower.includes('two');
    else if (a.includes('1')) ok = lower.includes('1') || lower.includes('one');
    else ok = lower.includes('no') || lower.includes('0') || lower.includes('zero');
  } else if (topic === 'system') {
    const pairs = current.answers;
    const nums = raw.replace(/[()]/g,'').split(/[,;]+/).map(s => parseFloat(s)).filter(v => !isNaN(v));
    const got = [];
    for (let i = 0; i < nums.length-1; i += 2) got.push([nums[i], nums[i+1]]);
    ok = pairs.every(p => got.some(g => Math.abs(g[0]-p[0])<0.1 && Math.abs(g[1]-p[1])<0.1));
  } else {
    const got = parseAnswers(raw);
    const exp = current.answers.map(v => fmt(v));
    if (exp.length === 0) ok = got.length===0 || raw.toLowerCase().includes('no');
    else ok = exp.every(v => got.some(g => Math.abs(g-v)<0.05));
  }

  if (ok) correct++;
  updateStats();

  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
  if (ok) {
    fb.innerHTML = '&#10003; Correct!' + (current.vertex ? '  Vertex: ' + current.vertex : '');
  } else {
    let ans;
    if (topic === 'discriminant') ans = current.answers[0];
    else if (topic === 'system') ans = current.answers.map(p=>`(${fmt(p[0])}, ${fmt(p[1])})`).join(' and ');
    else if (current.answers.length === 0) ans = 'No real solutions';
    else ans = current.answers.map(v=>`x = ${fmt(v)}`).join(' or ');
    fb.innerHTML = '&#10007; Not quite.  Answer: ' + ans;
  }
}

function showHint() {
  document.getElementById('hint').style.display = 'block';
  document.getElementById('hint').textContent = current.hint;
  document.getElementById('hint-link').style.display = 'none';
}

function newProblem() {
  const topic = document.getElementById('topic').value;
  current = topics[topic].gen(difficulty);
  document.getElementById('badge-topic').textContent = topics[topic].label;
  document.getElementById('prob').innerText = current.text;
  document.getElementById('ans').value = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hint').style.display = 'none';
  document.getElementById('hint-link').style.display = 'inline';
  document.getElementById('ans').focus();
}

function updateStats() {
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-pct').textContent = total ? Math.round(correct/total*100)+'%' : '—';
}

function resetStats() { total=0; correct=0; updateStats(); newProblem(); }

newProblem();
</script>
</body>
</html>
