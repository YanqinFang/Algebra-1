<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algebra 1 Math Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 2rem 1rem; }
    .app { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 26px; font-weight: 600; color: #1a237e; margin-bottom: 4px; }
    .subtitle { font-size: 15px; color: #555; margin-bottom: 1.5rem; }

    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 14px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 600; color: #1a237e; }
    .stat-lbl { font-size: 12px; color: #888; margin-top: 2px; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
    select { padding: 9px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; color: #111; }
    .btn { padding: 9px 20px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff; color: #111; }
    .btn:hover { background: #f0f0f0; }
    .btn-primary { background: #1a237e; color: #fff; border-color: #1a237e; }
    .btn-primary:hover { background: #283593; }
    .btn-danger { border-color: #ccc; }

    .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .topic-badge { display: inline-block; font-size: 12px; padding: 3px 12px; border-radius: 20px; background: #e8eaf6; color: #1a237e; font-weight: 500; margin-bottom: 1rem; }
    .problem-text { font-size: 18px; font-weight: 500; color: #111; margin-bottom: 1.25rem; line-height: 1.6; white-space: pre-line; }

    .input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .answer-input { padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; width: 220px; }
    .answer-input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 2px rgba(26,35,126,0.15); }

    .hint-link { font-size: 13px; color: #1a237e; cursor: pointer; text-decoration: underline; margin-top: 10px; display: none; }
    .hint { margin-top: 10px; padding: 10px 14px; border-left: 3px solid #9fa8da; background: #f5f5f5; font-size: 13px; color: #444; border-radius: 0 8px 8px 0; display: none; }
    .feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 14px; display: none; }
    .feedback.correct { background: #e8f5e9; color: #2e7d32; display: block; }
    .feedback.wrong { background: #ffebee; color: #c62828; display: block; }

    .footer { text-align: center; margin-top: 2rem; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
<div class="app">
  <h1>Algebra 1 Problem Generator</h1>
  <p class="subtitle">Practice problems with instant feedback — enter answers as x=2 or x=2,x=-3</p>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">attempted</div></div>
    <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-lbl">correct</div></div>
    <div class="stat"><div class="stat-num" id="s-pct">—</div><div class="stat-lbl">accuracy</div></div>
  </div>

  <div class="controls">
    <select id="topic">
      <option value="factor">Solve by factoring</option>
      <option value="quadformula">Quadratic formula</option>
      <option value="complete">Complete the square</option>
      <option value="discriminant">Discriminant</option>
      <option value="system">Linear-quadratic systems</option>
    </select>
    <button class="btn btn-primary" onclick="newProblem()">&#8635; New problem</button>
    <button class="btn btn-danger" onclick="resetStats()">&#x1F5D1; Reset</button>
  </div>

  <div class="card">
    <div class="topic-badge" id="badge">Factoring</div>
    <div class="problem-text" id="prob">Press "New problem" to start</div>
    <div class="input-row">
      <input class="answer-input" id="ans" placeholder="e.g. x=2,x=-3" onkeydown="if(event.key==='Enter')checkAnswer()">
      <button class="btn btn-primary" onclick="checkAnswer()">&#10003; Check</button>
    </div>
    <span class="hint-link" id="hint-link" onclick="showHint()">Show hint</span>
    <div class="hint" id="hint"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="footer">Algebra 1 Math Generator &mdash; built with GitHub Pages</div>
</div>

<script>
let current = null;
let total = 0, correct = 0;

function rnd(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const topics = {
  factor: {
    label: 'Solve by factoring',
    gen() {
      const r1 = pick([-5,-4,-3,-2,-1,1,2,3,4,5]);
      const r2 = pick([-5,-4,-3,-2,-1,1,2,3,4,5]);
      const b = -(r1 + r2), c = r1 * r2;
      const bStr = b === 0 ? '' : (b > 0 ? ` + ${b}x` : ` - ${Math.abs(b)}x`);
      const cStr = c === 0 ? '' : (c > 0 ? ` + ${c}` : ` - ${Math.abs(c)}`);
      const hint = `Factor as (x ${r1 >= 0 ? '- ' + r1 : '+ ' + Math.abs(r1)})(x ${r2 >= 0 ? '- ' + r2 : '+ ' + Math.abs(r2)}) = 0`;
      return { text: `Solve by factoring:\n  x² ${bStr}${cStr} = 0`, answers: [r1, r2], hint };
    }
  },
  quadformula: {
    label: 'Quadratic formula',
    gen() {
      const a = pick([1,1,1,2,3]);
      const r1 = pick([-4,-3,-2,-1,1,2,3,4]);
      const r2 = pick([-4,-3,-2,-1,1,2,3,4]);
      const b = -(a * (r1 + r2)), c = a * r1 * r2;
      const bStr = b === 0 ? '' : (b > 0 ? ` + ${b}x` : ` - ${Math.abs(b)}x`);
      const cStr = c === 0 ? '' : (c > 0 ? ` + ${c}` : ` - ${Math.abs(c)}`);
      const aStr = a === 1 ? '' : a;
      const hint = `a = ${a}, b = ${b}, c = ${c}. Use x = (−b ± √(b²−4ac)) / 2a`;
      return { text: `Use the quadratic formula:\n  ${aStr}x² ${bStr}${cStr} = 0`, answers: [r1, r2], hint };
    }
  },
  complete: {
    label: 'Complete the square',
    gen() {
      const h = pick([-4,-3,-2,-1,1,2,3,4]);
      const k = pick([-9,-4,-1,0,1,4,9,16]);
      const b = -2 * h, c = h * h + k;
      const bStr = b === 0 ? '' : (b > 0 ? ` + ${b}x` : ` - ${Math.abs(b)}x`);
      const cStr = c === 0 ? '' : (c > 0 ? ` + ${c}` : ` - ${Math.abs(c)}`);
      const disc = h * h - k;
      let answers;
      if (disc < 0) answers = [];
      else if (disc === 0) answers = [h];
      else { const sq = Math.sqrt(disc); answers = [h + sq, h - sq]; }
      const hint = `Rewrite as (x − ${h})² = ${-k}. Vertex is (${h}, ${k}).`;
      return { text: `Complete the square to solve:\n  x² ${bStr}${cStr} = 0\n\nAlso state the vertex.`, answers, hint, vertex: `(${h}, ${k})` };
    }
  },
  discriminant: {
    label: 'Discriminant',
    gen() {
      const type = pick(['two','one','none']);
      let a, b, c, label;
      if (type === 'two') { a=1; b=pick([-5,-4,-3,3,4,5]); c=pick([-6,-4,-3,-2,-1]); label='2 real solutions'; }
      else if (type === 'one') { a=1; b=pick([-6,-4,-2,2,4,6]); c=(b/2)*(b/2); label='1 real solution'; }
      else { a=1; b=pick([-2,-1,1,2]); c=pick([5,6,8,10]); label='No real solutions'; }
      const disc = b*b - 4*a*c;
      const bStr = b===0?'':(b>0?` + ${b}x`:` - ${Math.abs(b)}x`);
      const cStr = c===0?'':(c>0?` + ${c}`:` - ${Math.abs(c)}`);
      const hint = `Discriminant = b² − 4ac = ${b}² − 4(${a})(${c}) = ${disc}`;
      return { text: `How many real solutions?\n  x² ${bStr}${cStr} = 0`, answers: [label], hint };
    }
  },
  system: {
    label: 'Linear-quadratic system',
    gen() {
      const x1 = pick([-3,-2,-1,1,2,3]);
      const x2 = pick([-3,-2,-1,1,2,3]);
      const m = pick([-2,-1,1,2]);
      const b_lin = pick([-4,-2,0,2,4]);
      const y1 = m*x1 + b_lin, y2 = m*x2 + b_lin;
      const B = -(x1+x2), C = x1*x2;
      const BStr = B===0?'':(B>0?` + ${B}x`:` - ${Math.abs(B)}x`);
      const CStr = C===0?'':(C>0?` + ${C}`:` - ${Math.abs(C)}`);
      const mStr = m===1?'':(m===-1?'-':m);
      const bStr = b_lin===0?'':(b_lin>0?` + ${b_lin}`:` − ${Math.abs(b_lin)}`);
      const hint = `Substitute y = ${mStr}x${bStr} into the quadratic and solve.`;
      return { text: `Solve the system:\n  y = x²${BStr}${CStr}\n  y = ${mStr}x${bStr}`, answers: [[x1,y1],[x2,y2]], hint };
    }
  }
};

function parseAnswers(str) {
  return str.toLowerCase().replace(/\s/g,'').split(',').map(s => {
    const m = s.match(/x=(-?\d+\.?\d*)/);
    return m ? parseFloat(m[1]) : parseFloat(s);
  }).filter(v => !isNaN(v));
}

function checkAnswer() {
  if (!current) return;
  const raw = document.getElementById('ans').value.trim();
  if (!raw) return;
  const topic = document.getElementById('topic').value;
  const fb = document.getElementById('feedback');
  total++;

  let ok = false;
  if (topic === 'discriminant') {
    const lower = raw.toLowerCase();
    const a = current.answers[0].toLowerCase();
    if (a.includes('2')) ok = lower.includes('2') || lower.includes('two');
    else if (a.includes('1')) ok = lower.includes('1') || lower.includes('one');
    else ok = lower.includes('no') || lower.includes('0') || lower.includes('zero');
  } else if (topic === 'system') {
    const pairs = current.answers;
    const nums = raw.replace(/[()]/g,'').split(/[,;]+/).map(s => parseFloat(s.trim())).filter(v => !isNaN(v));
    const got = [];
    for (let i = 0; i < nums.length - 1; i += 2) got.push([nums[i], nums[i+1]]);
    ok = pairs.every(p => got.some(g => Math.abs(g[0]-p[0]) < 0.1 && Math.abs(g[1]-p[1]) < 0.1));
  } else {
    const got = parseAnswers(raw);
    const exp = current.answers.map(v => Math.round(v * 100) / 100);
    if (exp.length === 0) ok = got.length === 0 || raw.toLowerCase().includes('no');
    else ok = exp.every(v => got.some(g => Math.abs(g - v) < 0.05));
  }

  if (ok) correct++;
  updateStats();

  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
  if (ok) {
    fb.innerHTML = '&#10003; Correct!' + (current.vertex ? ' Vertex: ' + current.vertex : '');
  } else {
    const ans = topic === 'discriminant' ? current.answers[0] :
                topic === 'system' ? current.answers.map(p => `(${p[0]}, ${p[1]})`).join(' and ') :
                current.answers.length === 0 ? 'No real solutions' :
                current.answers.map(v => `x = ${Math.round(v*100)/100}`).join(' or ');
    fb.innerHTML = '&#10007; Not quite. Answer: ' + ans;
  }
}

function showHint() {
  const h = document.getElementById('hint');
  h.style.display = 'block';
  h.textContent = current.hint;
  document.getElementById('hint-link').style.display = 'none';
}

function newProblem() {
  const topic = document.getElementById('topic').value;
  current = topics[topic].gen();
  document.getElementById('badge').textContent = topics[topic].label;
  document.getElementById('prob').innerText = current.text;
  document.getElementById('ans').value = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hint').style.display = 'none';
  document.getElementById('hint-link').style.display = 'inline';
  document.getElementById('ans').focus();
}

function updateStats() {
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-pct').textContent = total ? Math.round(correct / total * 100) + '%' : '—';
}

function resetStats() { total = 0; correct = 0; updateStats(); newProblem(); }

newProblem();
</script>
</body>
</html>
